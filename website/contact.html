<!DOCTYPE html>
<html lang="ja">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">

</head>
<body>

<header>
  <div class="header-inner">
    <div class="site-title">
      <a href="index.html">カレラピアノの会</a>
      <span class="site-subtitle">大人のアマチュアピアニスト団体</span>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="concerts.html">公演情報</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">お問い合わせ</a></li>
      </ul>
    </nav>
  </div>
</header>

<main>
  <section>
    <h2>お問い合わせ</h2>
    <p>ご質問や参加のご相談など、お気軽にお問い合わせください。</p>

    <form class="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <!-- TODO: Formspreeに登録してIDを設定する -->
      <label for="name">お名前 <span style="color:#c44;">*</span></label>
      <input type="text" id="name" name="name" required>

      <label for="email">メールアドレス <span style="color:#c44;">*</span></label>
      <input type="email" id="email" name="email" required>

      <label for="message">メッセージ <span style="color:#c44;">*</span></label>
      <textarea id="message" name="message" required></textarea>

      <button type="submit">送信する</button>
    </form>

    <p style="margin-top:1.5rem; font-size:0.85rem;">
      * は入力必須項目です。<a href="privacy.html">プライバシーポリシー</a>が適用されます。
    </p>
  </section>
</main>

<footer>
  <nav>
    <ul>
      <li><a href="privacy.html">Privacy Policy</a></li>
      <li><a href="contact.html">お問い合わせ</a></li>
    </ul>
  </nav>
  <p>&copy; カレラピアノの会</p>
</footer>
