<main>
  <section>
    <h2>Contact</h2>
    <p>Have a question or interested in joining? Feel free to get in touch.</p>

    <form class="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <label for="name">Name <span style="color:#c44;">*</span></label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email <span style="color:#c44;">*</span></label>
      <input type="email" id="email" name="email" required>

      <label for="message">Message <span style="color:#c44;">*</span></label>
      <textarea id="message" name="message" required></textarea>

      <button type="submit">Send</button>
    </form>

    <p style="margin-top:1.5rem; font-size:0.85rem;">
      * Required fields. Our <a href="../privacy.html">Privacy Policy</a> applies.
    </p>
  </section>
</main>
